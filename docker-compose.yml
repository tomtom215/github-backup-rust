# Docker Compose configurations for github-backup-rust.
#
# By default, every service pulls the published multi-arch image from
# GHCR (`ghcr.io/tomtom215/github-backup-rust:latest`). To build from a
# local checkout instead, uncomment the `build: .` line under any
# service and comment out the `image:` line, or override with:
#
#     docker compose build
#
# Environment variables are loaded from `.env` in the same directory as
# this file. Copy `compose.example.env` to `.env` and fill in your
# secrets before running any of the services below.
#
# Profiles:
#   (default)  – local filesystem backup (mounts ./backups and ./config.toml)
#   s3         – backup to AWS S3
#   b2         – backup to Backblaze B2 (S3-compatible)
#   minio      – backup to self-hosted MinIO (bundled as a side service)
#   codeberg   – push mirrors to Codeberg after backup
#
# Usage:
#   # Local backup to ./backups/, reading ./config.toml:
#   docker compose run --rm backup octocat --all
#
#   # S3 backup:
#   docker compose --profile s3 run --rm backup-s3 octocat --all
#
#   # Codeberg mirror:
#   docker compose --profile codeberg run --rm backup-codeberg octocat --all

# Shared anchor: every service uses the same base image and volume layout.
x-image: &image ghcr.io/tomtom215/github-backup-rust:latest

x-common: &common
  image: *image
  # build: .                         # uncomment to build from local checkout
  volumes:
    - ./backups:/backup              # where backup output is written
    - ./config.toml:/etc/github-backup/config.toml:ro  # optional config file
  environment:
    GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN is required — see compose.example.env}

services:
  # ── Local filesystem backup ────────────────────────────────────────────────
  backup:
    <<: *common
    # Pass the owner and additional flags on the command line:
    #   docker compose run --rm backup octocat --all
    # The default command just points --output at the mounted volume; any
    # arguments after the service name are appended by Compose.
    command:
      - "--config"
      - "/etc/github-backup/config.toml"
      - "--output"
      - "/backup"

  # ── AWS S3 metadata sync ───────────────────────────────────────────────────
  backup-s3:
    <<: *common
    profiles: [s3]
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN is required}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
    command:
      - "--output"
      - "/backup"
      - "--s3-bucket"
      - "${S3_BUCKET:-my-github-backup-bucket}"
      - "--s3-region"
      - "${S3_REGION:-us-east-1}"

  # ── Backblaze B2 (S3-compatible) ───────────────────────────────────────────
  backup-b2:
    <<: *common
    profiles: [b2]
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN is required}
      AWS_ACCESS_KEY_ID: ${B2_KEY_ID:?B2_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${B2_APP_KEY:?B2_APP_KEY is required}
    command:
      - "--output"
      - "/backup"
      - "--s3-bucket"
      - "${B2_BUCKET:-my-b2-bucket}"
      - "--s3-region"
      - "${B2_REGION:-us-west-004}"
      - "--s3-endpoint"
      - "https://s3.${B2_REGION:-us-west-004}.backblazeb2.com"

  # ── MinIO (self-hosted S3-compatible) ──────────────────────────────────────
  minio:
    profiles: [minio]
    image: minio/minio:latest
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backup-minio:
    <<: *common
    profiles: [minio]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN is required}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command:
      - "--output"
      - "/backup"
      - "--s3-bucket"
      - "${MINIO_BUCKET:-github-backup}"
      - "--s3-region"
      - "us-east-1"
      - "--s3-endpoint"
      - "http://minio:9000"

  # ── Codeberg mirror ────────────────────────────────────────────────────────
  backup-codeberg:
    <<: *common
    profiles: [codeberg]
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN is required}
      MIRROR_TOKEN: ${MIRROR_TOKEN:?MIRROR_TOKEN is required}
    command:
      - "--output"
      - "/backup"
      - "--mirror-to"
      - "${MIRROR_URL:-https://codeberg.org}"
      - "--mirror-owner"
      - "${MIRROR_OWNER:?MIRROR_OWNER is required}"

volumes:
  minio-data:
