name: Deploy Book to GitHub Pages

# Runs on every push to main and can be triggered manually.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Allow only one concurrent deployment; cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: true

# Grant the GITHUB_TOKEN the permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mdBook and link checker
        # Pin mdBook to match the version used in ci.yml. book.toml enables
        # [output.linkcheck], so mdbook-linkcheck must be installed or the
        # build fails with "The command `mdbook-linkcheck` wasn't found".
        run: |
          cargo install mdbook --version "0.4.40" --locked
          cargo install mdbook-linkcheck --locked

      - name: Build book
        run: mdbook build docs

      - name: Upload Pages artifact
        # With the linkcheck backend enabled, mdBook emits each backend into
        # its own subdirectory (docs/book/html/ for HTML, docs/book/linkcheck/
        # for the link-check report). Publish only the HTML tree.
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/html/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
