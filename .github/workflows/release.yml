#
# Release pipeline for github-backup-rust.
#
# Triggered by pushing a semver tag, e.g.:
#
#     git tag -a v0.4.0 -m "Release v0.4.0"
#     git push origin v0.4.0
#
# Job dependency graph:
#
#   validate ──┬──► ci (matrix) ──┐
#              └──► security ─────┼──► binaries ──┬──► github-release
#                                 └──────────────►└──► docker
#
# This project does NOT publish to crates.io. Releases ship as:
#   * pre-built binaries for five targets, attached to the GitHub Release
#   * multi-arch container images on GHCR (`ghcr.io/<repo>:<tag>`)
#   * source install via `cargo install --git`
# Every workspace crate is marked `publish = false` in its `Cargo.toml`.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # stable:      v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"      # pre-release: v1.2.3-alpha.1

# Prevent concurrent releases for the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Minimal default permissions — individual jobs escalate only what they need.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Job 1: Validate tag, version consistency, and changelog entry ───────────
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version:       ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "::group::Tag metadata"
          printf 'Tag:        %s\n' "$TAG"
          printf 'Version:    %s\n' "$VERSION"

          # Validate semver (X.Y.Z with optional pre-release and build metadata).
          SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?(\+[A-Za-z0-9.]+)?$'
          if [[ ! "$VERSION" =~ $SEMVER_RE ]]; then
            echo "::error::Tag '$TAG' is not a valid semantic version."
            echo "Expected format: vX.Y.Z  or  vX.Y.Z-pre.1"
            exit 1
          fi

          # A pre-release is anything with a hyphen after X.Y.Z.
          if [[ "$VERSION" =~ - ]]; then
            IS_PRE=true
          else
            IS_PRE=false
          fi

          printf 'Pre-release: %s\n' "$IS_PRE"
          echo "::endgroup::"

          echo "version=$VERSION"      >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"

      - name: Verify workspace version matches tag
        shell: bash
        run: |
          TAG_VER="${{ steps.meta.outputs.version }}"

          # All member crates inherit `version.workspace = true`, so we only
          # need to check `[workspace.package].version` in the root manifest.
          #
          # NOTE: the leading regex uses `^[^"]*"` (not `.*"`) because awk
          # regexes are greedy — `.*"` would match through the closing quote
          # and leave an empty string.
          WS_VER=$(awk '
            /^\[workspace\.package\]/ { in_section = 1; next }
            /^\[/                     { in_section = 0 }
            in_section && /^[[:space:]]*version[[:space:]]*=/ {
              gsub(/^[^"]*"/, "", $0); gsub(/".*/, "", $0); print; exit
            }
          ' Cargo.toml)

          if [[ -z "$WS_VER" ]]; then
            echo "::error file=Cargo.toml::could not parse [workspace.package].version"
            exit 1
          fi

          if [[ "$WS_VER" != "$TAG_VER" ]]; then
            echo "::error file=Cargo.toml::workspace.package.version ($WS_VER) does not match tag ($TAG_VER)"
            echo "Bump the version in Cargo.toml before tagging."
            exit 1
          fi

          # Ensure intra-workspace dependency `version =` requirements line up
          # with the tag (cargo publish writes this verbatim into .crate files).
          DEP_MISMATCH=0
          while IFS= read -r line; do
            DEP_VER=$(printf '%s\n' "$line" | sed -n 's/.*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p')
            if [[ -n "$DEP_VER" && "$DEP_VER" != "$TAG_VER" ]]; then
              echo "::error file=Cargo.toml::workspace dependency line has version '$DEP_VER', expected '$TAG_VER': $line"
              DEP_MISMATCH=1
            fi
          done < <(grep -E '^github-backup-' Cargo.toml || true)

          if [[ "$DEP_MISMATCH" -eq 1 ]]; then
            exit 1
          fi

          echo "::notice::Workspace and intra-workspace deps both report v$TAG_VER"

      - name: Verify CHANGELOG entry exists
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"

          if ! grep -qE "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::no '## [$VERSION]' entry in CHANGELOG.md."
            echo "Add release notes for v$VERSION before tagging."
            exit 1
          fi
          echo "::notice::CHANGELOG.md entry found for v$VERSION"

  # ── Job 2: Full CI gate (parallel matrix) ──────────────────────────────────
  ci:
    name: CI / ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: "test · Linux"
            os: ubuntu-latest
            toolchain: stable
            command: cargo test --workspace --all-targets
          - name: "test · macOS"
            os: macos-latest
            toolchain: stable
            command: cargo test --workspace --all-targets
          - name: "clippy"
            os: ubuntu-latest
            toolchain: stable
            components: clippy
            command: cargo clippy --workspace --all-targets -- -D warnings
          - name: "fmt"
            os: ubuntu-latest
            toolchain: stable
            components: rustfmt
            command: cargo fmt --all -- --check
          - name: "doc"
            os: ubuntu-latest
            toolchain: stable
            command: cargo doc --workspace --no-deps
          - name: "MSRV 1.88"
            os: ubuntu-latest
            toolchain: "1.88"
            command: cargo build --workspace
    env:
      # Doc-warnings-as-errors only affects `cargo doc`; harmless for other steps.
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: ${{ matrix.components || '' }}
      - uses: Swatinem/rust-cache@v2
      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  # ── Job 3: Security audit ──────────────────────────────────────────────────
  security:
    name: Security audit (cargo-deny)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans advisories sources

  # ── Job 4: Build release binaries for every supported target ──────────────
  binaries:
    name: Binary (${{ matrix.target }})
    needs: [ci, security]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: github-backup-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: github-backup-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: github-backup-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: github-backup-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: github-backup-windows-x86_64
            ext: .exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --package github-backup --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --package github-backup --target ${{ matrix.target }}

      - name: Stage binary and checksum
        shell: bash
        run: |
          mkdir -p staging
          src="target/${{ matrix.target }}/release/github-backup${{ matrix.ext }}"
          dst="staging/${{ matrix.artifact }}${{ matrix.ext }}"
          cp "$src" "$dst"
          # Compute the SHA-256 next to the binary so users can verify downloads.
          if command -v sha256sum >/dev/null 2>&1; then
            (cd staging && sha256sum "$(basename "$dst")" > "$(basename "$dst").sha256")
          else
            (cd staging && shasum -a 256 "$(basename "$dst")" > "$(basename "$dst").sha256")
          fi
          ls -lh staging/

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: staging/*
          if-no-files-found: error
          retention-days: 7

  # ── Job 5: Create the GitHub release with binaries and notes ──────────────
  github-release:
    name: Create GitHub release
    needs: [validate, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create release, upload assets
    steps:
      - uses: actions/checkout@v6

      - name: Download all binary artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: github-backup-*
          merge-multiple: true

      - name: Compute combined SHA256SUMS
        shell: bash
        working-directory: dist
        run: |
          # Sort for stable output regardless of upload order.
          find . -maxdepth 1 -type f \
            ! -name '*.sha256' ! -name 'SHA256SUMS*' \
            -printf '%f\n' | sort | while read -r f; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          echo "::group::Extracting release notes for v$VERSION"
          awk "
            /^## \[$VERSION\]/ { found=1; next }
            found && /^## \[/  { exit }
            found              { print }
          " CHANGELOG.md > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            echo "::error::empty release notes extracted for $VERSION"
            exit 1
          fi
          echo "Preview:"
          cat release_notes.md
          echo "::endgroup::"

      - name: List release artefacts
        shell: bash
        run: ls -lh dist/

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          IS_PRE="${{ needs.validate.outputs.is_prerelease }}"
          TAG="v${VERSION}"

          PRE_FLAG=""
          [[ "$IS_PRE" == "true" ]] && PRE_FLAG="--prerelease"

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          if gh release view "$TAG" &>/dev/null; then
            echo "::warning::release ${TAG} already exists — updating it in place."
            gh release edit "$TAG" \
              $PRE_FLAG \
              --title "github-backup ${TAG}" \
              --notes-file release_notes.md
            gh release upload "$TAG" --clobber dist/*
          else
            gh release create "$TAG" \
              $PRE_FLAG \
              --title "github-backup ${TAG}" \
              --notes-file release_notes.md \
              dist/*
          fi

          {
            echo "## github-backup ${TAG}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${VERSION}\` |"
            echo "| Pre-release | \`${IS_PRE}\` |"
            echo "| Release | [${TAG}](${RELEASE_URL}) |"
            echo ""
            echo "### Artefacts"
            echo "\`\`\`"
            ls -lh dist/
            echo "\`\`\`"
            echo ""
            echo "### Install"
            echo "- Pre-built binary: download from the release page above"
            echo "- Docker: \`docker pull ghcr.io/${{ github.repository }}:${VERSION}\`"
            echo "- Source: \`cargo install --git https://github.com/${{ github.repository }} --tag ${TAG} github-backup\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Job 6: Publish container image to GHCR ─────────────────────────────────
  docker:
    name: Build and push image to GHCR
    needs: [validate, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      # Required for multi-platform builds: QEMU emulates the foreign arch,
      # and Buildx's docker-container driver is the only one that supports
      # multi-platform output. The default `docker` driver fails with
      # "Multi-platform build is not supported for the docker driver".
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
