name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Clippy ──────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ── MSRV ────────────────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  # ── Docs (rustdoc) ──────────────────────────────────────────────────────────
  docs:
    name: Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── mdBook (build + link check) ─────────────────────────────────────────────
  book:
    name: mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mdBook and link checker
        run: |
          cargo install mdbook --version "0.4.40" --locked
          cargo install mdbook-linkcheck --locked
      - run: mdbook build docs
      - uses: actions/upload-artifact@v7
        with:
          name: book
          path: docs/book/
          retention-days: 7

  # ── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── cargo-deny ──────────────────────────────────────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans advisories sources

  # ── Mutation testing ─────────────────────────────────────────────────────────
  #
  # On pull requests: test only mutants in lines changed by the PR (fast — only
  # the diff is mutated, not the whole codebase).
  #
  # On pushes to main: full workspace mutation test to catch any survivors that
  # slipped through the diff-based run.
  #
  # Branch pushes (non-main, non-PR): skipped — the full workspace has
  # pre-existing survivors in network/git/S3 code that require live
  # infrastructure to test and would produce constant false failures.
  mutants:
    name: Mutation testing (${{ github.event_name == 'pull_request' && 'diff' || 'full' }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full history for --in-diff

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation tests (PR — diff only)
        if: github.event_name == 'pull_request'
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          cargo mutants --workspace --timeout 120 --in-diff pr.diff -- --lib \
            2>&1 | tee mutants-report.txt

      - name: Run mutation tests (main — full)
        if: github.ref == 'refs/heads/main'
        run: |
          cargo mutants --workspace --timeout 120 -- --lib \
            2>&1 | tee mutants-report.txt

      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutants-report
          path: mutants-report.txt
          retention-days: 14
