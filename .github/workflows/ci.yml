name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  # Mutation testing is opt-in: trigger from the Actions tab via the
  # "Run workflow" button when you want to validate the test suite's
  # ability to kill mutants. It is intentionally NOT run on every push
  # or PR because the full workspace mutation pass takes 20-30 minutes
  # and the diff-based PR variant produces noisy results when the
  # changed code lives in a file that is excluded by `.cargo/mutants.toml`.
  workflow_dispatch:
    inputs:
      mutants_scope:
        description: "Mutation testing scope"
        type: choice
        default: full
        options:
          - full
          - diff
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Clippy ──────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ── MSRV ────────────────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  # ── Docs (rustdoc) ──────────────────────────────────────────────────────────
  docs:
    name: Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── mdBook (build + link check) ─────────────────────────────────────────────
  book:
    name: mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mdBook and link checker
        run: |
          cargo install mdbook --version "0.4.40" --locked
          cargo install mdbook-linkcheck --locked
      - run: mdbook build docs
      - uses: actions/upload-artifact@v7
        with:
          name: book
          path: docs/book/
          retention-days: 7

  # ── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    # rustsec/audit-check creates a check run and (optionally) an issue when an
    # advisory is found, so it needs explicit write permission for both. Without
    # these, the action errors out with
    #   "Resource not accessible by integration"
    # on the GitHub `checks` REST endpoint.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2026-0097: `rand` is unsound when a custom logger calls
          # `rand::rng()` from inside its `log` callback. Our runtime tree
          # uses `rand >= 0.9.3` (patched). The remaining `rand 0.8.5` lock
          # entry is pulled in transitively by `phf_generator`, which is a
          # *build-time* proc macro used by `terminfo`/`termwiz` and is not
          # compiled into our binary (we explicitly disable the termwiz
          # backend in `crates/github-backup-tui/Cargo.toml`). The advisory
          # therefore does not apply to any code we ship.
          ignore: RUSTSEC-2026-0097

  # ── cargo-deny ──────────────────────────────────────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans advisories sources

  # ── Mutation testing (on-demand) ─────────────────────────────────────────────
  #
  # This job is gated on `workflow_dispatch` so it does NOT run automatically
  # on push or pull-request events.  Trigger it manually from the GitHub
  # Actions tab via "Run workflow" → choose `full` or `diff` scope.
  #
  #   - `full` (default): mutate every non-excluded file in the workspace.
  #     Takes 20-30 minutes and is the canonical pre-release check.
  #   - `diff`: mutate only the lines changed since `origin/main`.  Useful
  #     when iterating on a feature branch and you want a fast check that
  #     your new code is exercised by tests.
  #
  # The exclusion list and rationale live in `.cargo/mutants.toml`.
  mutants:
    name: Mutation testing (${{ github.event.inputs.mutants_scope }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full history for --in-diff

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation tests (diff scope)
        if: github.event.inputs.mutants_scope == 'diff'
        run: |
          git fetch origin main
          git diff origin/main...HEAD > pr.diff
          cargo mutants --workspace --timeout 120 --in-diff pr.diff -- --lib \
            2>&1 | tee mutants-report.txt

      - name: Run mutation tests (full scope)
        if: github.event.inputs.mutants_scope == 'full'
        run: |
          cargo mutants --workspace --timeout 120 -- --lib \
            2>&1 | tee mutants-report.txt

      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutants-report
          path: mutants-report.txt
          retention-days: 14
