# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []

# ── Licenses ──────────────────────────────────────────────────────────────────

[licenses]
# Only allow OSI-approved permissive licences.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.93
exceptions = []

# ── Banned crates ─────────────────────────────────────────────────────────────

[bans]
multiple-versions = "warn"
# Intra-workspace crates use `{ workspace = true }` without an explicit
# version requirement; allow wildcard matches so cargo-deny does not flag them.
wildcards = "allow"
highlight = "all"

# These crates pull in OpenSSL or are superseded by our chosen stack.
deny = [
    { crate = "openssl-sys", reason = "use rustls instead" },
    { crate = "openssl",     reason = "use rustls instead" },
    { crate = "reqwest",     reason = "use hyper + hyper-rustls directly" },
    { crate = "native-tls",  reason = "use rustls instead" },
]

# ── Security advisories ───────────────────────────────────────────────────────

[advisories]
# Fetch the OSV advisory database.
version = 2
ignore = [
    # RUSTSEC-2026-0097: `rand` is unsound when a custom logger calls
    # `rand::rng()` from inside its `log` callback. The runtime dependency
    # tree uses `rand >= 0.9.3` (patched). The remaining `rand 0.8.5`
    # lockfile entry is pulled in transitively by `phf_generator`, which
    # is a *build-time* proc-macro used by `terminfo`/`termwiz` for static
    # perfect-hash generation. We disable the `termwiz` ratatui backend in
    # `crates/github-backup-tui/Cargo.toml`, so neither `phf_generator` nor
    # `rand 0.8.5` is linked into anything we actually ship. The advisory
    # therefore does not apply.
    "RUSTSEC-2026-0097",
]

# ── Sources ───────────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
