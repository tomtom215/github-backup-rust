# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []

# ── Licenses ──────────────────────────────────────────────────────────────────

[licenses]
# Only allow OSI-approved permissive licences.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CC0-1.0",
]
confidence-threshold = 0.93
exceptions = []

# ── Banned crates ─────────────────────────────────────────────────────────────

[bans]
multiple-versions = "warn"
# Workspace path deps (github-backup-{types,client,core}) use `{ workspace = true }`
# without an explicit version — this is intentional for intra-workspace crates.
wildcards = "allow"
highlight = "all"

# These crates pull in OpenSSL or are superseded by our chosen stack.
deny = [
    { crate = "openssl-sys", reason = "use rustls instead" },
    { crate = "openssl",     reason = "use rustls instead" },
    { crate = "reqwest",     reason = "use hyper + hyper-rustls directly" },
    { crate = "native-tls",  reason = "use rustls instead" },
]

# ── Security advisories ───────────────────────────────────────────────────────

[advisories]
# Fetch the OSV advisory database.
version = 2
ignore = []

# ── Sources ───────────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
